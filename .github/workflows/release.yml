name: Release

on:
  push:
    tags:
      - "v[0-9]+.*"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Quality gate ─────────────────────────────────────────────────────────────
  # Re-run checks so a release can never be created without a clean build,
  # even if someone pushes a tag without going through a PR.
  check:
    name: Quality gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - run: cargo fmt -- --check
      - run: cargo clippy -- -D warnings
      - run: cargo test

  # ── Build binaries ────────────────────────────────────────────────────────────
  # Linux targets cross-compile via cargo-zigbuild (zig supplies the musl
  # toolchain — no system deps needed). macOS and Windows use native runners
  # because reqwest's TLS backend (aws-lc-rs) compiles C that requires the
  # platform SDK; zigbuild cannot supply those headers cross-platform.
  build:
    name: Build (${{ matrix.artifact }})
    needs: check
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux — cross-compiled from ubuntu via cargo-zigbuild
          - { target: x86_64-unknown-linux-musl,  os: ubuntu-latest,  artifact: fi-linux-x86_64       }
          - { target: aarch64-unknown-linux-musl, os: ubuntu-latest,  artifact: fi-linux-aarch64      }
          # macOS — native runner required for macOS SDK headers
          - { target: aarch64-apple-darwin,       os: macos-latest,   artifact: fi-macos-aarch64      }
          # Windows — native runner required for MSVC libs
          - { target: x86_64-pc-windows-msvc,     os: windows-latest, artifact: fi-windows-x86_64.exe }

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-${{ matrix.target }}-

      # ── Linux: cross-compile with zig ────────────────────────────────────────
      - name: Install zig
        if: contains(matrix.target, 'linux')
        run: pip3 install ziglang

      - name: Install cargo-zigbuild
        if: contains(matrix.target, 'linux')
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Build (zigbuild)
        if: contains(matrix.target, 'linux')
        run: cargo zigbuild --release --target ${{ matrix.target }}

      # ── macOS / Windows: native build ────────────────────────────────────────
      - name: Build (native)
        if: ${{ !contains(matrix.target, 'linux') }}
        run: cargo build --release --target ${{ matrix.target }}

      # ── Stage binary ─────────────────────────────────────────────────────────
      - name: Stage artifact
        shell: bash
        run: |
          SRC="target/${{ matrix.target }}/release/fi"
          ARTIFACT="${{ matrix.artifact }}"
          [[ "$ARTIFACT" == *.exe ]] && SRC="${SRC}.exe"
          cp "$SRC" "$ARTIFACT"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  # ── Publish GitHub Release ────────────────────────────────────────────────────
  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
